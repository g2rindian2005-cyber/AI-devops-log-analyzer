name: CI/CD — AI DevOps ChatOps Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ai-devops-chatops
  REGISTRY: docker.io

jobs:
  # ── Build & Test ─────────────────────────────────────────────────────────────
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          cd app
          python -c "from app import app; print('App import OK')"

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} ./app

      - name: Security scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

  # ── Push to Docker Hub ────────────────────────────────────────────────────────
  push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Notify Slack — image pushed
        if: always()
        run: |
          STATUS="${{ job.status }}"
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"🐳 Docker push *${STATUS}* for \`${{ env.IMAGE_NAME }}\` | SHA: \`${{ github.sha }}\`\"}"

  # ── Deploy to EKS ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ secrets.AWS_REGION }}
      - name: Debug EKS Connection
        run: |
              aws sts get-caller-identity
                  aws eks list-clusters --region ${{ secrets.AWS_REGION }}
                   kubectl config current-context
                     kubectl get nodes
      - name: Deploy to Kubernetes
        run: |
          # Replace image placeholder with actual image
          sed -i "s|YOUR_DOCKERHUB_USERNAME|${{ secrets.DOCKERHUB_USERNAME }}|g" k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl set image deployment/chatops-app \
            chatops-app=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n chatops
          kubectl rollout status deployment/chatops-app -n chatops --timeout=300s

      - name: Get service URL
        run: |
          echo "Service URL:"
          kubectl get svc chatops-service -n chatops -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'

      - name: Notify Slack — deployment
        if: always()
        run: |
          STATUS="${{ job.status }}"
          EMOJI=$( [ "$STATUS" = "success" ] && echo "✅" || echo "❌" )
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"$EMOJI Deployment *${STATUS}* to EKS | Branch: \`main\` | SHA: \`${{ github.sha }}\`\"}"
